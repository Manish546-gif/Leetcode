name: Sync problems.json

on:
  push:
    branches: ["main"]
    paths:
      - "[0-9][0-9][0-9][0-9]-*/**"
      - "[0-9][0-9][0-9]-*/**"
      - "Difficulty:*/**"
      - "stats.json"
      - "server/scripts/sync-problems.js"
      - "server/scripts/sync-gfg.js"

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync problems.json
        run: node server/scripts/sync-problems.js
      - name: Sync GFG problems
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node server/scripts/sync-gfg.js
      - name: Commit changes
        run: |
          if git diff --quiet -- server/data/problems.json server/data/gfg-problems.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/data/problems.json server/data/gfg-problems.json
          git commit -m "chore: sync problems.json and gfg-problems.json [skip ci]"
          git push
      - name: Refresh Render API
        if: success()
        run: |
          if [ -n "$RENDER_SERVICE_URL" ]; then
            curl -s -X POST "$RENDER_SERVICE_URL/api/refresh" || echo "Refresh failed (non-fatal)"
          else
            echo "RENDER_SERVICE_URL not set, skipping refresh"
          fi
